add_newline = false
format = "$directory$git_branch${custom.git_status}$character"

[directory]
format = "[$path]($style)"
truncation_length = 4
truncate_to_repo = false
fish_style_pwd_dir_length = 1

[git_branch]
format = " [$branch]($style)"

[custom.git_status]
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
command = '''
esc=$(printf "\033")
green="${esc}[1;32m"
yellow="${esc}[1;33m"
red="${esc}[1;31m"
cyan="${esc}[1;36m"
magenta="${esc}[1;35m"
reset="${esc}[0m"
out=""
top=$(git rev-parse --show-toplevel 2>/dev/null) || exit 1

append() {
  out="${out}${out:+ }${1}${2}${reset}"
}

set -- $(git -C "$top" rev-list --left-right --count @{upstream}...HEAD 2>/dev/null)
behind=${1:-0}
ahead=${2:-0}
if [ "$ahead" -gt 0 ] && [ "$behind" -gt 0 ]; then
  append "$magenta" "⇕${ahead}/${behind}"
elif [ "$ahead" -gt 0 ]; then
  append "$green" "⇡${ahead}"
elif [ "$behind" -gt 0 ]; then
  append "$cyan" "⇣${behind}"
fi

conflicted=$(git -C "$top" diff --name-only --diff-filter=U 2>/dev/null | wc -l | tr -d " ")
staged=$(git -C "$top" diff --cached --name-only --diff-filter=ACDMR 2>/dev/null | wc -l | tr -d " ")
modified=$(git -C "$top" diff --name-only --diff-filter=M 2>/dev/null | wc -l | tr -d " ")
deleted=$(git -C "$top" diff --name-only --diff-filter=D 2>/dev/null | wc -l | tr -d " ")
untracked=$(git -C "$top" ls-files --others --exclude-standard 2>/dev/null | wc -l | tr -d " ")
stashed=$(git -C "$top" stash list 2>/dev/null | wc -l | tr -d " ")

[ "$conflicted" -gt 0 ] && append "$red" "=${conflicted}"
[ "$staged" -gt 0 ] && append "$green" "+${staged}"
[ "$modified" -gt 0 ] && append "$yellow" "!${modified}"
[ "$deleted" -gt 0 ] && append "$red" "✘${deleted}"
[ "$untracked" -gt 0 ] && append "$yellow" "?${untracked}"
[ "$stashed" -gt 0 ] && append "$cyan" "\$${stashed}"

[ -n "$out" ] && printf "%s" "$out"
'''
format = " $output"
unsafe_no_escape = true

[character]
success_symbol = " [❯](bold green)"
error_symbol = " [❯](bold red)"
