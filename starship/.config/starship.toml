add_newline = false
format = "$directory$git_branch$git_status$character"

[directory]
format = "[$path]($style)"
style = "cyan"
truncation_length = 4
truncate_to_repo = false
fish_style_pwd_dir_length = 1

[git_branch]
format = " [$branch]($style)"
style = "green"

[git_status]
format = "$all_status$ahead_behind"
conflicted = " [=${count}](red)"
staged = " [+${count}](green)"
modified = " [!${count}](yellow)"
deleted = " [!${count}](yellow)"
untracked = " [?${count}](yellow)"
stashed = " [$${count}](cyan)"
ahead = " [⇡${count}](green)"
behind = " [⇣${count}](cyan)"
diverged = " [⇕${ahead_count}/${behind_count}](magenta)"
style = "yellow"

[character]
success_symbol = " [❯](green)"
error_symbol = " [❯](red)"
